    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(0 .5 .5)">
      <stop offset="0%"  stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
      <animateTransform attributeName="gradientTransform" type="rotate"
        from="0 .5 .5" to="360 .5 .5" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="type">
      <rect x="170" y="479" height="29" width="0">
        <animate attributeName="width" dur="4.5s" repeatCount="indefinite"
          keyTimes="0;0.45;0.9;1" values="0;203;203;0"/>
      </rect>
    </clipPath>
    <style>
      .mono { font-size:11px; font-weight:600; fill:url(#g); white-space:pre; }
      /* shimmer: 3 dithered variants hard-swap, exactly one visible */
      #c0 { animation: s0 1.6s steps(1) infinite; }
      #c1 { animation: s1 1.6s steps(1) infinite; }
      #c2 { animation: s2 1.6s steps(1) infinite; }
      @keyframes s0 { 0%,33.3% {opacity:1} 33.4%,100% {opacity:0} }
      @keyframes s1 { 0%,33.3% {opacity:0} 33.4%,66.6% {opacity:1} 66.7%,100% {opacity:0} }
      @keyframes s2 { 0%,66.6% {opacity:0} 66.7%,100% {opacity:1} }
      #cursor { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 0%,50% {opacity:1} 50.1%,100% {opacity:0} }
      .name { font-size:21px; font-weight:700; fill:url(#g); letter-spacing:1px; }
    </style>
  </defs>
